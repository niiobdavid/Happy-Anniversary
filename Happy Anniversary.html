<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Very Important Question 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff6b9d;
    --deep-pink: #e0457b;
    --cream: #fff8f0;
    --dark: #2d1a24;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lora', serif;
    overflow: hidden;
    position: relative;
    background-image:
      radial-gradient(circle at 20% 20%, #ffe0ef 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, #ffd6e7 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #fff0f8 0%, transparent 60%);
  }

  .bg-heart {
    position: fixed;
    opacity: 0.12;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.12; }
    90%  { opacity: 0.12; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(20px);
    border: 1.5px solid rgba(255,107,157,0.2);
    border-radius: 28px;
    padding: 60px 56px 52px;
    max-width: 520px;
    width: 92vw;
    text-align: center;
    box-shadow:
      0 8px 40px rgba(224,69,123,0.12),
      0 2px 8px rgba(255,107,157,0.08),
      inset 0 1px 0 rgba(255,255,255,0.9);
    animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: scale(0.7) translateY(30px); }
    to   { opacity:1; transform: scale(1)   translateY(0); }
  }

  .emoji-row {
    font-size: 2.4rem;
    margin-bottom: 18px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 5vw, 2.4rem);
    color: var(--dark);
    line-height: 1.25;
    margin-bottom: 10px;
  }
  h1 em { font-style: italic; color: var(--deep-pink); }

  .subtitle {
    font-size: 0.95rem;
    color: #b07090;
    margin-bottom: 44px;
    font-style: italic;
  }

  /* Buttons sit side by side */
  .buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
  }

  .btn-yes {
    background: linear-gradient(135deg, var(--pink), var(--deep-pink));
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 1.15rem;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(224,69,123,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 20;
  }
  .btn-yes:hover  { transform: scale(1.07); box-shadow: 0 6px 28px rgba(224,69,123,0.5); }
  .btn-yes:active { transform: scale(0.97); }

  /*
    Invisible spacer — keeps the card layout stable
    so Yes doesn't shift when No floats away.
  */
  .btn-no-ghost {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 15px 40px;
    font-size: 1.05rem;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    border-radius: 50px;
    border: 2px solid transparent;
    visibility: hidden;
    pointer-events: none;
    user-select: none;
  }

  /* The real No — fixed overlay, starts above the ghost */
  .btn-no {
    background: #fff;
    color: var(--deep-pink);
    border: 2px solid var(--pink);
    border-radius: 50px;
    padding: 15px 40px;
    font-size: 1.05rem;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    cursor: pointer;
    position: fixed;
    z-index: 100;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 12px rgba(255,107,157,0.15);
    transition: left 0.18s cubic-bezier(0.34,1.56,0.64,1),
                top  0.18s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.2s;
    opacity: 0; /* hidden until JS positions it */
  }
  .btn-no:hover { box-shadow: 0 4px 18px rgba(255,107,157,0.25); }

  .attempt-text {
    margin-top: 22px;
    font-size: 0.85rem;
    color: #c490a8;
    font-style: italic;
    min-height: 22px;
  }

  /* ── Modals ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(45,26,36,0.55);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s;
  }
  .modal-overlay.show { opacity:1; pointer-events:all; }

  .modal-box {
    background: #fff;
    border-radius: 24px;
    padding: 36px 32px 28px;
    max-width: 400px;
    width: 90vw;
    text-align: center;
    box-shadow: 0 20px 60px rgba(45,26,36,0.25);
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.show .modal-box { transform: scale(1); }

  /*
  ┌─────────────────────────────────────────────────────────┐
  │  IMAGE SLOT — swap the src attribute of .modal-img      │
  │  in each modal to your own image or GIF URL.            │
  └─────────────────────────────────────────────────────────┘
  */
  .modal-img {
    width: 100%;
    max-width: 280px;
    height: 220px;
    object-fit: cover;
    border-radius: 16px;
    margin: 0 auto 16px;
    display: block;
    background: #f0e0eb; /* placeholder bg if image fails */
  }

  .modal-caption {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--dark);
    line-height: 1.45;
  }
  .modal-caption em { color: var(--deep-pink); }

  .modal-hint {
    margin-top: 12px;
    font-size: 0.76rem;
    color: #c0aab5;
    font-style: italic;
  }

  #yes-modal .modal-box {
    background: linear-gradient(160deg, #fff6fb, #fff0f5);
    border: 2px solid rgba(255,107,157,0.2);
  }

  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
  }
</style>
</head>
<body>

<!-- Floating bg hearts -->
<script>
  const bh = ['💗','💓','💞','🌸','✨','💖'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='bg-heart';
    el.textContent=bh[Math.floor(Math.random()*bh.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.animationDuration=(8+Math.random()*12)+'s';
    el.style.animationDelay=(-Math.random()*20)+'s';
    el.style.fontSize=(0.8+Math.random()*1.2)+'rem';
    document.body.appendChild(el);
  }
</script>

<div class="card">
  <div class="emoji-row">💌 🌹 💕</div>
  <h1>Will you be my <em>Girlfriend?</em></h1>
  <p class="subtitle">Think carefully… there's only one right answer 😉</p>

  <div class="buttons">
    <button class="btn-yes" id="yesBtn" onclick="handleYes()">Yes 💖</button>
    <!-- Ghost keeps card width stable -->
    <span class="btn-no-ghost" id="noGhost">No 🙅</span>
  </div>

  <p class="attempt-text" id="attemptText"></p>
</div>

<!-- Real No button (fixed) -->
<button class="btn-no" id="noBtn">No 🙅</button>


<!-- ═══════════════════════════════════════════════════════
     GUN MODAL
     ↓ Replace the `src` on the img below with your image ↓
     ═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="gun-modal">
  <div class="modal-box">
    <img class="modal-img"
         id="gun-img"
         src="https://media.giphy.com/media/LmNwrBhejkK9EFP504/giphy.gif"
         alt="Replace me — cat with toy gun">
    <p class="modal-caption"><em>"Don't play with me my frenn"</em> 😾🔫</p>
    <p class="modal-hint">tap anywhere to close</p>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════
     YES MODAL
     ↓ Replace the `src` on the img below with your image ↓
     ═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="yes-modal">
  <div class="modal-box">
    <img class="modal-img"
         id="yes-img"
         src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
         alt="Replace me — celebration image">
    <p class="modal-caption">Yayyyyy!! 🎉💕<br><em>You just made me the happiest person alive!</em> 🥹❤️</p>
    <p class="modal-hint">tap anywhere to close</p>
  </div>
</div>


<script>
  const noBtn       = document.getElementById('noBtn');
  const noGhost     = document.getElementById('noGhost');
  const attemptText = document.getElementById('attemptText');
  const gunModal    = document.getElementById('gun-modal');
  const yesModal    = document.getElementById('yes-modal');
  const yesBtn      = document.getElementById('yesBtn');

  // ── Yes hover messages ──────────────────────────────────
  const yesMsgs = [
    "Yesss, that's the one! 🥰",
    "Great choice, I knew it! 💖",
    "You're going to make me cry 🥹",
    "Best decision of your life! ✨",
    "Go on… click it! 💕",
  ];
  let yesHoverCount = 0;

  yesBtn.addEventListener('mouseenter', () => {
    const msg = yesMsgs[yesHoverCount % yesMsgs.length];
    attemptText.textContent = msg;
    yesHoverCount++;
  });

  yesBtn.addEventListener('mouseleave', () => {
    // Clear only if a No-hover hasn't already set a message
    if(!noLeaveMsg) attemptText.textContent = '';
  });

  let noLeaveMsg = false;

  const MARGIN = 20; // min px from any edge
  let hoverCount = 0;
  let locked = false; // block hover during modal

  // ── Helpers ────────────────────────────────────────────
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  function ghostRect(){
    return noGhost.getBoundingClientRect();
  }

  function snapToOrigin(animate){
    const r   = ghostRect();
    const dur = animate ? '0.38s' : '0s';
    noBtn.style.transition = `left ${dur} cubic-bezier(0.34,1.56,0.64,1), top ${dur} cubic-bezier(0.34,1.56,0.64,1)`;
    noBtn.style.left = r.left + 'px';
    noBtn.style.top  = r.top  + 'px';
  }

  // On load — align No over ghost, then reveal
  window.addEventListener('load', () => {
    snapToOrigin(false);
    noBtn.style.opacity = '1';
  });
  window.addEventListener('resize', () => {
    if(hoverCount === 0) snapToOrigin(false);
  });

  // ── Safe random position (always visible on screen) ────
  function randomPos(){
    const bw = noBtn.offsetWidth  || 130;
    const bh = noBtn.offsetHeight || 52;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    return {
      x: clamp(Math.random()*(vw - bw), MARGIN, vw - bw - MARGIN),
      y: clamp(Math.random()*(vh - bh), MARGIN, vh - bh - MARGIN)
    };
  }

  // ── Hover handler ───────────────────────────────────────
  noBtn.addEventListener('mouseenter', () => {
    if(locked) return;
    hoverCount++;

    if(hoverCount === 1){
      // First time: gentle nudge right, stays near original spot
      const r  = ghostRect();
      const bw = noBtn.offsetWidth || 130;
      const vw = window.innerWidth;
      const nudgeX = clamp(r.left + 110, MARGIN, vw - bw - MARGIN);
      noBtn.style.transition = 'left 0.22s ease-out, top 0.22s ease-out';
      noBtn.style.left = nudgeX + 'px';
      noBtn.style.top  = r.top + 'px';
      noLeaveMsg = true;
      attemptText.textContent = "Hmm, are you sure about that? 🤔";
      return;
    }
    noLeaveMsg = true;

    // Hovers 2–4: jump to a random safe spot
    const pos = randomPos();
    noBtn.style.transition = 'left 0.16s cubic-bezier(0.34,1.56,0.64,1), top 0.16s cubic-bezier(0.34,1.56,0.64,1)';
    noBtn.style.left = pos.x + 'px';
    noBtn.style.top  = pos.y + 'px';

    const msgs = [
      "That button keeps running away… 👀",
      "It really doesn't want to be clicked 😅",
      "Okay okay, message received 😏"
    ];
    attemptText.textContent = msgs[Math.min(hoverCount - 2, msgs.length - 1)];

    if(hoverCount === 4){
      locked = true;
      setTimeout(() => gunModal.classList.add('show'), 250);
    }
  });

  // Safety: if it somehow gets clicked, jump away
  noBtn.addEventListener('click', e => {
    e.preventDefault();
    const pos = randomPos();
    noBtn.style.left = pos.x + 'px';
    noBtn.style.top  = pos.y + 'px';
  });

  // ── Gun modal close → reset No button ──────────────────
  gunModal.addEventListener('click', () => {
    gunModal.classList.remove('show');
    hoverCount = 0;
    locked = false;
    noLeaveMsg = false;
    attemptText.textContent = '';
    setTimeout(() => snapToOrigin(true), 100);
  });

  // ── Yes! ────────────────────────────────────────────────
  function handleYes(){
    launchConfetti();
    yesModal.classList.add('show');
  }

  yesModal.addEventListener('click', () => yesModal.classList.remove('show'));

  // ── Confetti from all 4 corners ─────────────────────────
  const HEARTS = ['💗','💖','💕','💓','💞','✨','🌸','🎀','💝','🌹'];

  function launchConfetti(){
    const corners = [
      {x:0,                 y:0},
      {x:window.innerWidth, y:0},
      {x:0,                 y:window.innerHeight},
      {x:window.innerWidth, y:window.innerHeight}
    ];
    corners.forEach(c => { for(let i=0;i<20;i++) spawnHeart(c.x, c.y); });
  }

  function spawnHeart(ox, oy){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = HEARTS[Math.floor(Math.random()*HEARTS.length)];

    const angle    = Math.random()*Math.PI*2;
    const speed    = 140+Math.random()*260;
    const dx       = Math.cos(angle)*speed;
    const dy       = Math.sin(angle)*speed - 80;
    const duration = 1.7+Math.random()*0.9;
    const size     = 1.1+Math.random()*1.5;

    el.style.cssText=`left:${ox}px;top:${oy}px;font-size:${size}rem;`;
    document.body.appendChild(el);

    const start = performance.now();
    (function frame(now){
      const t = (now-start)/(duration*1000);
      if(t>=1){ el.remove(); return; }
      const ease = 1-t*t;
      el.style.left      = (ox+dx*t)+'px';
      el.style.top       = (oy+dy*t+220*t*t)+'px';
      el.style.opacity   = ease;
      el.style.transform = `rotate(${t*360}deg) scale(${0.4+ease})`;
      requestAnimationFrame(frame);
    })(start);
  }
</script>
</body>
</html>
